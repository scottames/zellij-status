---
name: ci
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
concurrency:
  # yamllint disable-line rule:line-length
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions: read-all
env:
  RUSTFLAGS: -Dwarnings
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        # yamllint disable-line rule:line-length
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: setup
        uses: ./.github/actions/setup
      - run: mise run lint
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        # yamllint disable-line rule:line-length
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: setup
        uses: ./.github/actions/setup
      - run: mise run test
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        # yamllint disable-line rule:line-length
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: setup
        uses: ./.github/actions/setup
      - run: mise run build
