[settings]
[settings.task]
show_full_cmd = true

[tools]
rust = "latest"

[tasks.build]
description = "Build the plugin"
run = "cargo build"

[tasks."build-release"]
description = "Build the plugin in release mode"
run = "cargo build --release"

[tasks.example]
description = "Build and launch a Zellij dev session with an example profile"
depends = ["build"]
usage = '''
arg "[profile]" help="Config profile to use" default="default" {
    choices "default" "minimal" "powerline" "vertical" "vertical-right"
}
'''
run = """
#!/usr/bin/env bash
profile="${usage_profile?}"
config_dir="./examples/$profile"
if [[ ! -d "$config_dir" ]]; then
  echo "error: unknown profile '$profile' (no directory at $config_dir)" >&2
  echo "available profiles: default, minimal, powerline, vertical, vertical-right" >&2
  exit 1
fi
zellij delete-session "zellij-status-$profile" >&2
zellij \
  -s "zellij-status-$profile" \
  --config-dir "$config_dir" \
  --config "$config_dir/config.kdl" \
  -n "$config_dir/layout.kdl"
"""

[tasks.install]
description = "Install the plugin to ~/.config/zellij/plugins/"
depends = ["build"]
quiet = true
run = """
#!/usr/bin/env bash
dest="$HOME/.config/zellij/plugins"
mkdir -p "$dest"
cp target/wasm32-wasip1/debug/zellij-status.wasm "$dest/"
echo "Installed to '$dest/zellij-status.wasm'"
"""

[tasks.test]
description = "Run tests on native target"
run = """
#!/usr/bin/env bash
cargo test --lib --target "$(rustc -vV | sed -n 's/^host: //p')"
"""

[tasks.lint]
description = "Run clippy"
run = "cargo clippy --all-features --lib"

[tasks.check]
description = "Run all checks"
run = ["trunk check"]

[tasks.check-all]
description = "Run all checks"
depends = ["lint", "build", "test"]
run = ["trunk check"]
