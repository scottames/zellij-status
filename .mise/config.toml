[settings]
[settings.task]
show_full_cmd = true

[tools]
"aqua:zellij-org/zellij" = "0.44.0"
rust = "latest"

[tasks.build]
description = "Build the plugin"
run = "cargo build"

[tasks."build-release"]
description = "Build the plugin in release mode"
run = "cargo build --release"

[tasks.example]
description = "Build and launch a Zellij dev session with an example profile"
depends = ["build"]
usage = '''
arg "[profile]" help="Config profile to use" default="default" {
    choices "default" "minimal" "powerline" "vertical" "vertical-right"
}
'''
run = """
#!/usr/bin/env bash
profile="${usage_profile?}"
config_dir="./examples/$profile"
if [[ ! -d "$config_dir" ]]; then
  echo "error: unknown profile '$profile' (no directory at $config_dir)" >&2
  echo "available profiles: default, minimal, powerline, vertical, vertical-right" >&2
  exit 1
fi
plugin_url="file:target/wasm32-wasip1/debug/zellij-status.wasm"
permissions_file="$HOME/.cache/zellij/permissions.kdl"
if [[ ! -f "$permissions_file" ]] || ! grep -Fq "\"$plugin_url\"" "$permissions_file"; then
  cat >&2 <<EOF
warning: missing Zellij permissions for the local build artifact.
If the status pane appears blank, add this stanza to $permissions_file:

"$plugin_url" {
    ReadApplicationState
    ChangeApplicationState
    ReadCliPipes
    RunCommands
}

Zellij 0.44 keys permissions by the plugin URL used in the layout. The examples
use $plugin_url.

EOF
fi
mise exec -- zellij delete-session "zellij-status-$profile" >&2
mise exec -- zellij \
  -s "zellij-status-$profile" \
  --config-dir "$config_dir" \
  --config "$config_dir/config.kdl" \
  -n "$config_dir/layout.kdl"
"""

[tasks.install]
description = "Install the plugin to ~/.config/zellij/plugins/"
depends = ["build"]
quiet = true
run = """
#!/usr/bin/env bash
dest="$HOME/.config/zellij/plugins"
mkdir -p "$dest"
cp target/wasm32-wasip1/debug/zellij-status.wasm "$dest/"
echo "Installed to '$dest/zellij-status.wasm'"
"""

[tasks.test]
description = "Run tests on native target"
run = """
#!/usr/bin/env bash
cargo test --lib --target "$(rustc -vV | sed -n 's/^host: //p')"
"""

[tasks."config-docs"]
description = "Generate the KDL config reference from schema/config-schema.json"
run = """
#!/usr/bin/env bash
cargo run --target "$(rustc -vV | sed -n 's/^host: //p')" --bin config-docgen
"""

[tasks."check-config-docs"]
description = "Verify docs/config-reference.kdl matches the schema"
run = """
#!/usr/bin/env bash
cargo run --target "$(rustc -vV | sed -n 's/^host: //p')" --bin config-docgen -- --check
"""

[tasks.lint]
description = "Run clippy"
run = "cargo clippy --all-features --lib"

[tasks.check]
description = "Run all checks"
run = ["trunk check"]

[tasks.check-all]
description = "Run all checks"
depends = ["lint", "check-config-docs", "build", "test"]
run = ["trunk check"]
