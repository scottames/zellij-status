[settings]
[settings.task]
show_full_cmd = true

[tools]
"npm:fission-ai/openspec" = "latest"
rust = "latest"

[tasks.build]
description = "Build the plugin"
run = "cargo build"

[tasks."build-release"]
description = "Build the plugin in release mode"
run = "cargo build --release"

[tasks.dev]
description = "Build and launch a Zellij dev session with a config profile"
depends = ["build"]
usage = '''
arg "[profile]" help="Config profile to use" default="default" {
    choices "default" "scotty" "horizontal"
}
'''
run = """
#!/usr/bin/env bash
profile="${usage_profile?}"
config_dir="./examples/$profile"
if [[ ! -d "$config_dir" ]]; then
  echo "error: unknown profile '$profile' (no directory at $config_dir)" >&2
  echo "available profiles: default, scotty, horizontal" >&2
  exit 1
fi
zellij \
  -s "zellij-status-$profile" \
  --config-dir "$config_dir" \
  --config "$config_dir/config.kdl" \
  -n "$config_dir/layout.kdl"
"""

[tasks.test]
description = "Run tests (native target, lib only — binary requires WASM host)"
run = "cargo test --lib --target x86_64-unknown-linux-gnu"

[tasks.lint]
description = "Run clippy"
run = "cargo clippy --all-features --lib"

[tasks.check]
description = "Run all checks"
run = ["trunk check"]
